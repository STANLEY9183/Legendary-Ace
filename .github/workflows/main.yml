name: Cloud AI Website Updater

on:
  # This schedules the script to run entirely by itself every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # This button allows you to trigger the update manually whenever you want
  workflow_dispatch:

jobs:
  build_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives GitHub permission to save changes back to your repository

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Cloud Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install BeautifulSoup Dependency
      run: |
        pip install beautifulsoup4

    - name: Run AI Content Script
      run: |
        python update_site.py

    - name: Save and Commit Changes to Live Site
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Automated Cloud Content Update"
        git push
