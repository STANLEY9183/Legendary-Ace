<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legendary Ace | Latest News</title>
    <script src="https://tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { zinc: { 750: '#3f3f46' } } } }
        }
    </script>
</head>
<body class="dark bg-zinc-100 text-zinc-900 dark:bg-zinc-900 dark:text-zinc-100 font-sans transition-colors duration-300">
    
    <!-- Top Navigation Bar -->
    <nav class="p-6 bg-white dark:bg-zinc-950 flex justify-between items-center border-b-2 border-red-500 sticky top-0 z-50 shadow-lg transition-colors duration-300">
        <div class="w-10"></div> 
        <div class="flex space-x-12">
            <a href="index.html" class="text-red-500 dark:text-red-400 font-black tracking-wide border-b-2 border-red-500 dark:border-red-400 pb-1">NEWS</a>
            <a href="leagues.html" class="text-zinc-700 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 font-semibold transition-colors duration-200">LEAGUES</a>
            <a href="players.html" class="text-zinc-700 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 font-semibold transition-colors duration-200">PLAYERS</a>
            <a href="about.html" class="text-zinc-700 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 font-semibold transition-colors duration-200">ABOUT</a>
        </div>
        <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-zinc-200 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 hover:bg-zinc-300 dark:hover:bg-zinc-700 transition-all active:scale-95">
            <svg id="sun-icon" class="w-5 h-5 text-amber-400 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
            <svg id="moon-icon" class="w-5 h-5 text-zinc-700 dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <h1 class="text-6xl font-black mb-8 italic tracking-tight text-zinc-900 dark:text-white">
            TRANSFER <span class="bg-gradient-to-r from-red-600 to-orange-500 dark:from-red-500 dark:to-orange-400 bg-clip-text text-transparent">WATCH</span>
        </h1>

        <!-- Live Match Countdown Timer Module -->
        <section class="mb-10 bg-gradient-to-br from-zinc-900 to-zinc-950 text-white p-6 rounded-2xl border border-zinc-800 shadow-md">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <span class="text-xs font-bold uppercase tracking-widest text-red-400">Next Big Match Matchday</span>
                    <h4 class="text-xl font-extrabold mt-1">Real Madrid vs. Barcelona</h4>
                </div>
                <div class="flex space-x-3 text-center font-mono">
                    <div class="bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl min-w-[55px]"><div id="timer-days" class="text-2xl font-black text-red-400">00</div><div class="text-[9px] uppercase tracking-wider text-zinc-400 font-sans">Days</div></div>
                    <div class="bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl min-w-[55px]"><div id="timer-hours" class="text-2xl font-black text-white">00</div><div class="text-[9px] uppercase tracking-wider text-zinc-400 font-sans">Hrs</div></div>
                    <div class="bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl min-w-[55px]"><div id="timer-minutes" class="text-2xl font-black text-white">00</div><div class="text-[9px] uppercase tracking-wider text-zinc-400 font-sans">Min</div></div>
                    <div class="bg-zinc-800 border border-zinc-700 px-3 py-2 rounded-xl min-w-[55px]"><div id="timer-seconds" class="text-2xl font-black text-red-500 animate-pulse">00</div><div class="text-[9px] uppercase tracking-wider text-zinc-400 font-sans">Sec</div></div>
                </div>
            </div>
        </section>
        
        <!-- Interactive Category Filters -->
        <div class="flex space-x-3 mb-8">
            <button onclick="filterNews('all')" id="btn-all" class="px-5 py-2 rounded-full text-sm font-bold bg-red-500 text-white transition-all scale-105 shadow-md">All News</button>
            <button onclick="filterNews('rumor')" id="btn-rumor" class="px-5 py-2 rounded-full text-sm font-bold bg-white dark:bg-zinc-800 text-zinc-800 dark:text-zinc-300 border border-zinc-300 dark:border-transparent hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all">Rumors</button>
            <button onclick="filterNews('done')" id="btn-done" class="px-5 py-2 rounded-full text-sm font-bold bg-white dark:bg-zinc-800 text-zinc-800 dark:text-zinc-300 border border-zinc-300 dark:border-transparent hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all">Done Deals</button>
        </div>

        <!-- TARGET CONTAINER ID APPLIED BELOW FOR PYTHON AUTOMATION SCRIPT -->
        <div id="news-feed" class="space-y-6">
            <!-- Python script will safely clear and inject all articles right here -->
        </div>
    </main>

    <div class="fixed bottom-4 right-4 text-zinc-400 dark:text-zinc-500 text-[10px] font-mono tracking-widest uppercase">legendary ace</div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark'); }

        const matchDate = new Date("Dec 31, 2026 20:00:00").getTime();
        setInterval(function() {
            const gap = matchDate - new Date().getTime();
            document.getElementById("timer-days").innerHTML = Math.floor(gap / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("timer-hours").innerHTML = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("timer-minutes").innerHTML = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("timer-seconds").innerHTML = Math.floor((gap % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        function toggleLike(button) {
            const countSpan = button.querySelector('.count');
            const svgElement = button.querySelector('svg');
            let currentCount = parseInt(countSpan.textContent);
            if (button.classList.toggle('liked')) {
                button.classList.add('text-red-500');
                svgElement.setAttribute('fill', 'currentColor');
                countSpan.textContent = currentCount + 1;
            } else {
                button.classList.remove('text-red-500');
                svgElement.setAttribute('fill', 'none');
                countSpan.textContent = currentCount - 1;
            }
        }

        function filterNews(category) {
            const cards = document.querySelectorAll('.news-card');
            const buttons = document.querySelectorAll('[id^="btn-"]');
            buttons.forEach(btn => {
                btn.classList.remove('bg-red-500', 'text-white', 'scale-105', 'shadow-md');
                btn.classList.add('bg-white', 'dark:bg-zinc-800', 'text-zinc-800', 'dark:text-zinc-300');
            });
            document.getElementById(`btn-${category}`).classList.add('bg-red-500', 'text-white', 'scale-105', 'shadow-md');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.setProperty('display', 'block', 'important');
                    setTimeout(() => card.style.opacity = '1', 10);
                } else {
                    card.style.opacity = '0';
                    card.style.setProperty('display', 'none', 'important');
                }
            });
        }
    </script>
</body>
</html>
